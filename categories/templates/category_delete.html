{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
  <h3 class="display-6">Deletar Categoria</h3>

  <div class="card">
    <div class="card-body">

      <p class="card-text">
        Tem certeza que deseja deletar a categoria
        <strong>{{ object.name }}</strong>?
      </p>

      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
          Deletar
        </button>
      </form>

      <a href="{% url 'category_list' %}"
         class="btn btn-dark border border-secondary px-4 py-2 rounded-3 mt-3 shadow-sm">
        <i class="bi bi-arrow-left-short fs-5"></i>
        Voltar para Categorias
      </a>

    </div>
  </div>
</div>

{% endblock %}
