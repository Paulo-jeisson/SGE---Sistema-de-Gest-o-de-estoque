<aside class="sge-sidebar bg-dark border-end border-secondary">
  <button
    class="btn btn-outline-light d-md-none mb-3"
    type="button"
    data-bs-toggle="collapse"
    data-bs-target="#menuCollapse"
    aria-expanded="false"
    aria-controls="menuCollapse"
  >
    <i class="bi bi-list fs-4"></i>
  </button>

  <nav class="collapse d-md-block" id="menuCollapse" aria-label="Menu principal">
    <ul class="nav nav-pills flex-column gap-2">
      <li class="nav-item">
        <a href="{% url 'home' %}" class="nav-link px-0">
          <i class="bi bi-speedometer2 fs-4"></i>
          <span class="ms-2">Dashboard</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'supplier_list' %}" class="nav-link px-0">
          <i class="bi bi-truck fs-4"></i>
          <span class="ms-2">Fornecedores</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'brand_list' %}" class="nav-link px-0">
          <i class="bi bi-shop fs-4"></i>
          <span class="ms-2">Marcas</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'category_list' %}" class="nav-link px-0">
          <i class="bi bi-tags fs-4"></i>
          <span class="ms-2">Categorias</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'product_list' %}" class="nav-link px-0">
          <i class="bi bi-box-seam fs-4"></i>
          <span class="ms-2">Produtos</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'inflow_list' %}" class="nav-link px-0">
          <i class="bi bi-arrow-down-left-square fs-4"></i>
          <span class="ms-2">Entradas</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'outflow_list' %}" class="nav-link px-0">
          <i class="bi bi-arrow-up-right-square fs-4"></i>
          <span class="ms-2">Saídas</span>
        </a>
      </li>
      <li class="nav-item">
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-link nav-link px-0 text-start">
            <i class="bi bi-box-arrow-right fs-4"></i>
            <span class="ms-2">Sair</span>
          </button>
        </form>
      </li>
    </ul>
  </nav>
</aside>
